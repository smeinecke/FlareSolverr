name: Manual Integration Tests

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      scope:
        description: "Integration test scope"
        required: true
        default: "non-proxy"
        type: choice
        options:
          - non-proxy
          - proxy
          - all

jobs:
  integration-manual:
    name: Manual Integration (Docker)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            ~/.cache/pip
          key: uv-cache-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            uv-cache-

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          uv sync --group dev --extra test

      - name: Create test compose file
        run: |
          cat > docker-compose.test.yml << 'EOF'
          services:
            flaresolverr:
              build: .
              ports:
                - "127.0.0.1:8191:8191"
              networks:
                - test-network
            proxy-http:
              build:
                context: .github/docker/tinyproxy
                dockerfile: Dockerfile
              ports:
                - "127.0.0.1:8888:8888"
              networks:
                - test-network
            proxy-socks:
              image: serjs/go-socks5-proxy:latest
              environment:
                - REQUIRE_AUTH=false
              ports:
                - "127.0.0.1:1080:1080"
              networks:
                - test-network
          networks:
            test-network:
              driver: bridge
          EOF

      - name: Start all services
        run: |
          docker compose -f docker-compose.test.yml up -d --build

      - name: Wait for FlareSolverr to be ready
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8191/ >/dev/null 2>&1; then
              echo "FlareSolverr is ready"
              exit 0
            fi
            sleep 2
          done
          echo "FlareSolverr failed to start"
          docker compose -f docker-compose.test.yml logs flaresolverr
          exit 1

      - name: Wait for proxies to be ready
        run: |
          for i in {1..30}; do
            if curl -fsS --proxy http://127.0.0.1:8888 https://example.com >/dev/null && \
               curl -fsS --socks5-hostname 127.0.0.1:1080 https://example.com >/dev/null; then
              echo "Proxies are ready"
              exit 0
            fi
            sleep 2
          done
          echo "Proxy readiness check failed"
          docker compose -f docker-compose.test.yml logs
          exit 1

      - name: Run integration tests (non-proxy scenarios)
        if: ${{ github.event.inputs.scope == 'non-proxy' || github.event.inputs.scope == 'all' }}
        env:
          FLARESOLVERR_URL: http://127.0.0.1:8191
        run: |
          uv run pytest -m integration tests/integration -k "not proxy_http_param and not proxy_http_param_with_credentials and not proxy_socks_param" -vv

      - name: Run integration tests (proxy scenarios)
        if: ${{ github.event.inputs.scope == 'proxy' || github.event.inputs.scope == 'all' }}
        env:
          FLARESOLVERR_URL: http://127.0.0.1:8191
          PROXY_HTTP_URL: http://proxy-http:8888
          PROXY_SOCKS_URL: socks5://proxy-socks:1080
        run: |
          uv run pytest -m integration tests/integration/test_api.py -k "proxy_http_param or proxy_http_param_with_credentials or proxy_socks_param" -vv

      - name: Dump FlareSolverr logs on failure
        if: failure()
        run: |
          docker compose -f docker-compose.test.yml logs flaresolverr

      - name: Dump proxy logs on failure
        if: failure()
        run: |
          docker compose -f docker-compose.test.yml logs

      - name: Tear down services
        if: always()
        run: |
          docker compose -f docker-compose.test.yml down -v --remove-orphans
          rm -f docker-compose.test.yml
