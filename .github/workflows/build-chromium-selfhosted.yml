name: Build Custom Chromium (Self-Hosted Runner)

# Builds Chromium directly on the runner (no Docker for the compile step).
# Persistent paths on the runner disk:
#   /data/depot_tools  — depot_tools checkout (updated each run)
#   /data/chromium/src — Chromium source tree (synced to version, never re-fetched)
#   /data/ccache       — ccache directory (shared across all builds)
#
# First cold build: several hours depending on CPU count.
# Subsequent builds of the same version: minutes (ccache hits).
# Version upgrade: gclient sync only (no full re-fetch).

on:
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:
    inputs:
      chromium_version:
        description: 'Chromium version to build. Leave empty for latest stable.'
        required: false
        type: string
      force_sync:
        description: 'Force full gclient sync even if version matches'
        required: false
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/chromium-stealth
  CHROMIUM_ROOT: /data/chromium
  DEPOT_TOOLS: /data/depot_tools
  CCACHE_DIR: /data/ccache

jobs:
  build:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Resolve Chromium version
        id: resolve
        run: |
          if [ -n "${{ inputs.chromium_version }}" ]; then
            echo "chromium_version=${{ inputs.chromium_version }}" >> $GITHUB_OUTPUT
          else
            VERSION=$(curl -s 'https://chromiumdash.appspot.com/fetch_releases?channel=Stable' | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          releases = [r for r in data if r.get('version')]
          print('148.0.7778.0') if not releases else print(sorted(releases, key=lambda r: tuple(map(int, r['version'].split('.'))), reverse=True)[0]['version'])
          ")
            echo "chromium_version=$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Install build dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y --no-install-recommends \
            git curl python3 python3-pip \
            build-essential ccache lld clang ninja-build pkg-config \
            libgl1-mesa-dev libgles2-mesa-dev \
            libx11-dev libxkbcommon-dev libwayland-dev \
            libnss3-dev libdbus-1-dev libdrm-dev libgbm-dev \
            libasound2-dev libpulse-dev libxshmfence-dev \
            libjpeg-dev libpng-dev libwebp-dev libtiff-dev \
            libxml2-dev libxslt1-dev libfontconfig1-dev \
            libxcomposite1 libxcursor1 libxdamage1 libxext6 libxfixes3 libxi6 \
            libxrandr2 libxrender1 libxtst6 \
            libgtk-3-dev libpango1.0-dev libatk1.0-dev libcairo2-dev \
            libgdk-pixbuf-2.0-dev libatspi2.0-dev

      - name: Update depot_tools
        run: |
          if [ -d "${{ env.DEPOT_TOOLS }}/.git" ]; then
            git -C "${{ env.DEPOT_TOOLS }}" pull --ff-only
          else
            git clone --depth=1 https://chromium.googlesource.com/chromium/tools/depot_tools.git "${{ env.DEPOT_TOOLS }}"
          fi

      - name: Sync Chromium source
        env:
          CHROMIUM_VERSION: ${{ steps.resolve.outputs.chromium_version }}
          PATH: /data/depot_tools:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        run: |
          git config --global http.lowSpeedLimit 0
          git config --global http.lowSpeedTime 999999

          CURRENT_VERSION=""
          if [ -f "${{ env.CHROMIUM_ROOT }}/src/.version" ]; then
            CURRENT_VERSION=$(cat "${{ env.CHROMIUM_ROOT }}/src/.version")
          fi

          if [ "$CURRENT_VERSION" = "$CHROMIUM_VERSION" ] && [ "${{ inputs.force_sync }}" != "true" ]; then
            echo "Source already at $CHROMIUM_VERSION — skipping sync"
          elif [ -d "${{ env.CHROMIUM_ROOT }}/src/.git" ]; then
            echo "Updating existing source from $CURRENT_VERSION to $CHROMIUM_VERSION"
            cd "${{ env.CHROMIUM_ROOT }}/src"
            git fetch origin "refs/tags/$CHROMIUM_VERSION:refs/tags/$CHROMIUM_VERSION" --no-tags --depth=1 || true
            git checkout "$CHROMIUM_VERSION" || git checkout "tags/$CHROMIUM_VERSION"
            gclient sync --with_tags --no-history -D -j$(nproc)
            gclient runhooks
            find third_party -type f -name "node" -exec chmod +x {} \; 2>/dev/null || true
            echo "$CHROMIUM_VERSION" > .version
          else
            echo "Fresh fetch of Chromium $CHROMIUM_VERSION"
            mkdir -p "${{ env.CHROMIUM_ROOT }}"
            cd "${{ env.CHROMIUM_ROOT }}"
            for i in {1..5}; do
              fetch --nohooks --no-history chromium && break || sleep 60
            done
            cd src
            git fetch origin "refs/tags/$CHROMIUM_VERSION:refs/tags/$CHROMIUM_VERSION" --no-tags --depth=1 || true
            git checkout "$CHROMIUM_VERSION" || git checkout "tags/$CHROMIUM_VERSION"
            for i in {1..5}; do
              gclient sync --with_tags --no-history -D -j$(nproc) && break || sleep 60
            done
            gclient runhooks
            find third_party -type f -name "node" -exec chmod +x {} \; 2>/dev/null || true
            find . -type f -name "*.bin" -exec chmod +x {} \; 2>/dev/null || true
            echo "$CHROMIUM_VERSION" > .version
          fi

      - name: Apply patches
        env:
          CHROMIUM_VERSION: ${{ steps.resolve.outputs.chromium_version }}
        run: |
          cd "${{ env.CHROMIUM_ROOT }}/src"
          # Reset patched files to a clean state before re-applying
          git checkout -- \
            third_party/blink/renderer/core/dom/events/event.h \
            third_party/blink/renderer/core/frame/navigator_automation_information.idl \
            third_party/blink/renderer/core/frame/navigator.h \
            third_party/blink/renderer/core/frame/navigator.cc \
            third_party/blink/renderer/modules/webgl/webgl_rendering_context_base.cc \
            content/renderer/render_frame_impl.cc \
            third_party/blink/renderer/core/workers/dedicated_worker_global_scope.cc \
            2>/dev/null || true
          python3 ${{ github.workspace }}/chromium-patches/patches/apply.py

      - name: Configure build
        env:
          PATH: /data/depot_tools:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        run: |
          mkdir -p "${{ env.CCACHE_DIR }}"
          ccache -M 30G
          cd "${{ env.CHROMIUM_ROOT }}/src"
          # cc_wrapper=ccache integrates ccache at the gn level for best hit rates
          GN_ARGS="$(cat ${{ github.workspace }}/chromium-patches/gn-args.txt) cc_wrapper=\"ccache\""
          gn gen out/Release --args="${GN_ARGS}"

      - name: Build chrome and chromedriver
        env:
          PATH: /data/depot_tools:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
          CCACHE_DIR: /data/ccache
        run: |
          cd "${{ env.CHROMIUM_ROOT }}/src"
          ninja -C out/Release -j$(nproc) chrome chromedriver
          ccache --show-stats

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push runtime image
        env:
          CHROMIUM_VERSION: ${{ steps.resolve.outputs.chromium_version }}
        run: |
          mkdir -p /tmp/chromium-bin/opt/chromium
          cd "${{ env.CHROMIUM_ROOT }}/src/out/Release"
          cp chrome chromedriver chrome_crashpad_handler /tmp/chromium-bin/opt/chromium/ 2>/dev/null || true
          cp *.so /tmp/chromium-bin/opt/chromium/ 2>/dev/null || true
          cp *.pak /tmp/chromium-bin/opt/chromium/ 2>/dev/null || true
          cp icudtl.dat /tmp/chromium-bin/opt/chromium/ 2>/dev/null || true
          cp -r locales resources /tmp/chromium-bin/opt/chromium/ 2>/dev/null || true

          docker build \
            --build-arg CHROMIUM_VERSION="$CHROMIUM_VERSION" \
            -t "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$CHROMIUM_VERSION" \
            -t "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" \
            -t "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-amd64" \
            -f "${{ github.workspace }}/chromium-patches/Dockerfile.runtime" \
            /tmp/chromium-bin

          docker push "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$CHROMIUM_VERSION"
          docker push "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          docker push "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-amd64"
          rm -rf /tmp/chromium-bin
