name: Build Custom Chromium (Split - Free Runners)

on:
  workflow_dispatch:
    inputs:
      chromium_version:
        description: 'Chromium version to build'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/chromium-stealth
  APT_BUILD_DEPS: >-
    zstd build-essential ccache lld clang ninja-build pkg-config
    libgl1-mesa-dev libgles2-mesa-dev
    libx11-dev libxkbcommon-dev libwayland-dev
    libnss3-dev libdbus-1-dev libdrm-dev libgbm-dev
    libasound2-dev libpulse-dev libxshmfence-dev
    libjpeg-dev libpng-dev libwebp-dev libtiff-dev
    libxml2-dev libxslt1-dev libfontconfig1-dev
    libxcomposite1 libxcursor1 libxdamage1 libxext6 libxfixes3 libxi6
    libxrandr2 libxrender1 libxtst6
    libgtk-3-dev libpango1.0-dev libatk1.0-dev libcairo2-dev
    libgdk-pixbuf-2.0-dev libatspi2.0-dev

jobs:
  # Stage 1: Fetch source - network-bound, works fine on free runner
  fetch-source:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    outputs:
      chromium_version: ${{ steps.resolve.outputs.chromium_version }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: resolve
        run: |
          if [ -n "${{ inputs.chromium_version }}" ]; then
            echo "chromium_version=${{ inputs.chromium_version }}" >> $GITHUB_OUTPUT
          else
            VERSION=$(curl -s 'https://chromiumdash.appspot.com/fetch_releases?channel=Stable' | python3 -c "import sys,json; data=json.load(sys.stdin); releases=[r for r in data if r.get('version')]; print('148.0.7778.0') if not releases else print(sorted(releases,key=lambda r:tuple(map(int,r['version'].split('.'))),reverse=True)[0]['version'])")
            echo "chromium_version=$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Check for cached Chromium source
        id: cache-source
        uses: actions/cache@v4
        with:
          path: /tmp/chromium-source.tar.zst
          key: chromium-source-${{ steps.resolve.outputs.chromium_version }}

      - name: Fetch Chromium source
        if: steps.cache-source.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update && sudo apt-get install -y zstd
          mkdir -p /tmp/chromium
          cd /tmp/chromium
          git clone --depth=1 https://chromium.googlesource.com/chromium/tools/depot_tools.git
          export PATH="/tmp/chromium/depot_tools:$PATH"
          git config --global http.lowSpeedLimit 0
          git config --global http.lowSpeedTime 999999
          for i in {1..5}; do
            fetch --nohooks --no-history chromium && break || sleep 60
          done
          cd src
          git fetch origin "refs/tags/${{ steps.resolve.outputs.chromium_version }}:refs/tags/${{ steps.resolve.outputs.chromium_version }}" --no-tags --depth=1 || true
          git checkout "${{ steps.resolve.outputs.chromium_version }}" || git checkout "tags/${{ steps.resolve.outputs.chromium_version }}"
          for i in {1..5}; do
            gclient sync --with_tags --no-history -D -j4 && break || sleep 60
          done
          gclient runhooks
          find third_party -type f -name "node" -exec chmod +x {} \; 2>/dev/null || true
          find . -type f -name "*.bin" -exec chmod +x {} \; 2>/dev/null || true

      - name: Compress source for upload
        if: steps.cache-source.outputs.cache-hit != 'true'
        run: |
          cd /tmp
          ZSTD_CLEVEL=9 tar --zstd -cf chromium-source.tar.zst chromium
          ls -lh chromium-source.tar.zst

      - name: Upload source artifact
        uses: actions/upload-artifact@v4
        with:
          name: chromium-source
          path: /tmp/chromium-source.tar.zst
          retention-days: 1

  # Stage 2: Build chrome and chromedriver in parallel (independent build graphs)
  build:
    needs: fetch-source
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      matrix:
        target:
          - name: chrome
          - name: chromedriver
    steps:
      - uses: actions/checkout@v4

      - name: Download source artifact
        uses: actions/download-artifact@v4
        with:
          name: chromium-source
          path: /tmp

      - name: Extract source
        run: |
          cd /tmp
          tar --zstd -xf chromium-source.tar.zst

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ needs.fetch-source.outputs.chromium_version }}-${{ matrix.target.name }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ needs.fetch-source.outputs.chromium_version }}-${{ matrix.target.name }}-
            ccache-${{ needs.fetch-source.outputs.chromium_version }}-

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y ${{ env.APT_BUILD_DEPS }}

      - name: Apply patches and configure
        run: |
          export PATH="/tmp/chromium/depot_tools:$PATH"
          cd /tmp/chromium/src
          python3 ${{ github.workspace }}/chromium-patches/patches/apply.py
          gn gen out/Release --args="$(cat ${{ github.workspace }}/chromium-patches/gn-args.txt)"

      - name: Build ${{ matrix.target.name }}
        run: |
          export PATH="/tmp/chromium/depot_tools:$PATH"
          export CCACHE_DIR=~/.ccache
          cd /tmp/chromium/src
          ninja -C out/Release -j2 ${{ matrix.target.name }}

      - name: Collect artifacts
        run: |
          mkdir -p /tmp/output
          cd /tmp/chromium/src/out/Release
          if [ "${{ matrix.target.name }}" = "chrome" ]; then
            cp chrome /tmp/output/
            cp *.pak /tmp/output/ 2>/dev/null || true
            cp icudtl.dat /tmp/output/ 2>/dev/null || true
            cp -r locales /tmp/output/ 2>/dev/null || true
            cp -r resources /tmp/output/ 2>/dev/null || true
          else
            cp chromedriver /tmp/output/
          fi
          cd /tmp && tar czf ${{ matrix.target.name }}.tar.gz -C output .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target.name }}
          path: /tmp/${{ matrix.target.name }}.tar.gz
          retention-days: 1

      - name: Trim ccache before saving
        run: ccache -M 2G && ccache -c

      - name: Save ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ needs.fetch-source.outputs.chromium_version }}-${{ matrix.target.name }}-${{ github.sha }}

  # Stage 3: Assemble final Docker image
  assemble:
    needs: [fetch-source, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/artifacts

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Assemble binaries
        run: |
          mkdir -p /tmp/chromium-bin/opt/chromium
          tar xzf /tmp/artifacts/chrome/chrome.tar.gz       -C /tmp/chromium-bin/opt/chromium
          tar xzf /tmp/artifacts/chromedriver/chromedriver.tar.gz -C /tmp/chromium-bin/opt/chromium
          ls -la /tmp/chromium-bin/opt/chromium/

      - name: Build and push runtime image
        uses: docker/build-push-action@v5
        with:
          context: /tmp/chromium-bin
          file: ${{ github.workspace }}/chromium-patches/Dockerfile.runtime
          push: true
          build-args: |
            CHROMIUM_VERSION=${{ needs.fetch-source.outputs.chromium_version }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.fetch-source.outputs.chromium_version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
