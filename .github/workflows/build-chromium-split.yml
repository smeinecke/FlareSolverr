name: Build Custom Chromium (Split - Free Runners)

on:
  workflow_dispatch:
    inputs:
      chromium_version:
        description: 'Chromium version to build'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/chromium-stealth

jobs:
  # Stage 1: Fetch source - this is network-bound, works fine on free runner
  fetch-source:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    outputs:
      chromium_version: ${{ steps.resolve.outputs.chromium_version }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: resolve
        run: |
          if [ -n "${{ inputs.chromium_version }}" ]; then
            echo "chromium_version=${{ inputs.chromium_version }}" >> $GITHUB_OUTPUT
          else
            VERSION=$(curl -s 'https://chromiumdash.appspot.com/fetch_releases?channel=Stable' | python3 -c "import sys,json; data=json.load(sys.stdin); releases=[r for r in data if r.get('version')]; print('148.0.7778.0') if not releases else print(sorted(releases,key=lambda r:tuple(map(int,r['version'].split('.'))),reverse=True)[0]['version'])")
            echo "chromium_version=$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Fetch Chromium source
        run: |
          sudo apt-get update && sudo apt-get install -y zstd
          mkdir -p /tmp/chromium
          cd /tmp/chromium
          git clone --depth=1 https://chromium.googlesource.com/chromium/tools/depot_tools.git
          export PATH="/tmp/chromium/depot_tools:$PATH"
          # Retry fetch up to 5 times with 60s backoff on rate limits
          for i in {1..5}; do
            fetch --nohooks --no-history chromium && break || sleep 60
          done
          cd src
          git fetch origin "refs/tags/${{ steps.resolve.outputs.chromium_version }}:refs/tags/${{ steps.resolve.outputs.chromium_version }}" --no-tags --depth=1 || true
          git checkout "${{ steps.resolve.outputs.chromium_version }}" || git checkout "tags/${{ steps.resolve.outputs.chromium_version }}"
          # Retry gclient sync up to 5 times with 60s backoff on rate limits
          for i in {1..5}; do
            gclient sync --with_tags --no-history -D && break || sleep 60
          done
          gclient runhooks
          # Fix execute permissions on third-party binaries
          find third_party -type f -name "node" -exec chmod +x {} \; 2>/dev/null || true
          find . -type f -name "*.bin" -exec chmod +x {} \; 2>/dev/null || true

      - name: Upload source artifact
        uses: actions/upload-artifact@v4
        with:
          name: chromium-source
          path: /tmp/chromium
          retention-days: 1

  # Stage 2: Build Chrome components in parallel using matrix strategy
  build-chrome-components:
    needs: fetch-source
    runs-on: ubuntu-latest
    timeout-minutes: 180  # 3 hours per component
    strategy:
      matrix:
        component:
          - name: chrome-binary
            targets: chrome
          - name: resources
            targets: chrome_resources
          - name: pak-files
            targets: gen_snapshot
          - name: icu-data
            targets: icu
    steps:
      - uses: actions/checkout@v4

      - name: Download source artifact
        uses: actions/download-artifact@v4
        with:
          name: chromium-source
          path: /tmp/chromium

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ needs.fetch-source.outputs.chromium_version }}-${{ matrix.component.name }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ needs.fetch-source.outputs.chromium_version }}-${{ matrix.component.name }}-
            ccache-${{ needs.fetch-source.outputs.chromium_version }}-

      - name: Build Chrome component
        shell: bash
        run: |
          sudo apt-get update && sudo apt-get install -y zstd build-essential ccache lld clang ninja-build pkg-config libgl1-mesa-dev libgles2-mesa-dev libx11-dev libxkbcommon-dev libwayland-dev libnss3-dev libdbus-1-dev libdrm-dev libgbm1-dev libasound2-dev libpulse-dev libxshmfence-dev libjpeg-dev libpng-dev libwebp-dev libtiff-dev libxml2-dev libxslt1-dev libfontconfig1-dev
          export PATH="/tmp/chromium/depot_tools:$PATH"
          cd src
          python3 ${{ github.workspace }}/chromium-patches/patches/apply.py
          gn gen out/Release --args='is_debug=false is_component_build=false symbol_level=0 blink_symbol_level=0 is_official_build=false chrome_pgo_phase=0 ffmpeg_branding="Chrome" proprietary_codecs=true enable_nacl=false use_cups=false use_pulseaudio=false use_gtk=false use_qt=false use_ozone=true ozone_platform_headless=true'
          export CCACHE_DIR=~/.ccache
          case "${{ matrix.component.name }}" in
            chrome-binary)
              ninja -C out/Release -j2 chrome
              mkdir -p /tmp/output
              cp out/Release/chrome /tmp/output/
              ;;
            resources)
              ninja -C out/Release -j2 chrome_resources
              mkdir -p /tmp/output
              cp -r out/Release/locales /tmp/output/ 2>/dev/null || true
              cp -r out/Release/resources /tmp/output/ 2>/dev/null || true
              ;;
            pak-files)
              ninja -C out/Release -j2 gen_snapshot
              mkdir -p /tmp/output
              cp out/Release/*.pak /tmp/output/ 2>/dev/null || true
              ;;
            icu-data)
              ninja -C out/Release -j2 icu
              mkdir -p /tmp/output
              cp out/Release/icudtl.dat /tmp/output/ 2>/dev/null || true
              ;;
          esac
          cd /tmp && tar czf ${{ matrix.component.name }}.tar.gz -C output .

      - name: Upload ${{ matrix.component.name }} artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.component.name }}
          path: /tmp/${{ matrix.component.name }}.tar.gz
          retention-days: 1

      - name: Limit ccache size before saving
        run: |
          ccache -M 2G
          ccache -c

      - name: Save ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ needs.fetch-source.outputs.chromium_version }}-${{ matrix.component.name }}-${{ github.sha }}

  # Stage 2b: Build chromedriver separately (can run in parallel)
  build-chromedriver:
    needs: fetch-source
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - name: Download source artifact
        uses: actions/download-artifact@v4
        with:
          name: chromium-source
          path: /tmp/chromium

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ needs.fetch-source.outputs.chromium_version }}-chromedriver-${{ github.sha }}
          restore-keys: |
            ccache-${{ needs.fetch-source.outputs.chromium_version }}-chromedriver-
            ccache-${{ needs.fetch-source.outputs.chromium_version }}-

      - name: Build Chromedriver only
        shell: bash
        run: |
          sudo apt-get update && sudo apt-get install -y zstd build-essential ccache lld clang ninja-build pkg-config libgl1-mesa-dev libnss3-dev libdbus-1-dev libdrm-dev libgbm1-dev libxshmfence-dev libfontconfig1-dev
          export PATH="/tmp/chromium/depot_tools:$PATH"
          cd src
          python3 ${{ github.workspace }}/chromium-patches/patches/apply.py
          gn gen out/Release --args='is_debug=false is_component_build=false symbol_level=0 blink_symbol_level=0 is_official_build=false chrome_pgo_phase=0 ffmpeg_branding="Chrome" proprietary_codecs=true enable_nacl=false use_cups=false use_pulseaudio=false use_gtk=false use_qt=false use_ozone=true ozone_platform_headless=true'
          export CCACHE_DIR=~/.ccache
          ninja -C out/Release -j2 chromedriver
          mkdir -p /tmp/output
          cp out/Release/chromedriver /tmp/output/
          cd /tmp && tar czf chromedriver.tar.gz -C output .

      - name: Upload Chromedriver artifact
        uses: actions/upload-artifact@v4
        with:
          name: chromedriver-binary
          path: /tmp/chromedriver.tar.gz
          retention-days: 1

      - name: Limit ccache size before saving
        run: |
          ccache -M 2G
          ccache -c

      - name: Save ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ needs.fetch-source.outputs.chromium_version }}-chromedriver-${{ github.sha }}

  # Stage 3: Assemble final Docker image
  assemble:
    needs: [fetch-source, build-chrome-components, build-chromedriver]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/artifacts

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract binaries and assemble
        run: |
          mkdir -p /tmp/chromium-bin/opt/chromium
          # Extract all Chrome component artifacts
          tar xzf /tmp/artifacts/chrome-binary/chrome-binary.tar.gz -C /tmp/chromium-bin/opt/chromium
          tar xzf /tmp/artifacts/resources/resources.tar.gz -C /tmp/chromium-bin/opt/chromium
          tar xzf /tmp/artifacts/pak-files/pak-files.tar.gz -C /tmp/chromium-bin/opt/chromium
          tar xzf /tmp/artifacts/icu-data/icu-data.tar.gz -C /tmp/chromium-bin/opt/chromium
          # Extract chromedriver
          tar xzf /tmp/artifacts/chromedriver-binary/chromedriver.tar.gz -C /tmp/chromium-bin/opt/chromium
          ls -la /tmp/chromium-bin/opt/chromium/

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: /tmp/chromium-bin
          file: ${{ github.workspace }}/chromium-patches/Dockerfile.runtime
          push: true
          build-args: |
            CHROMIUM_VERSION=${{ needs.fetch-source.outputs.chromium_version }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.fetch-source.outputs.chromium_version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
