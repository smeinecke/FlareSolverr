name: Build Custom Chromium

on:
  schedule:
    # Weekly build to pick up new Chromium stable releases
    - cron: '0 6 * * 0'
  workflow_dispatch:
    inputs:
      chromium_version:
        description: 'Chromium version to build (e.g., 134.0.6998.35). Leave empty for latest stable.'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/chromium-stealth

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      chromium_version: ${{ steps.resolve.outputs.chromium_version }}
    steps:
      - name: Resolve Chromium version
        id: resolve
        run: |
          if [ -n "${{ inputs.chromium_version }}" ]; then
            echo "chromium_version=${{ inputs.chromium_version }}" >> $GITHUB_OUTPUT
          else
            echo "Fetching latest stable Chromium version..."
            # Use tuple sort to correctly order patch versions (e.g. .9 < .100)
            VERSION=$(curl -s 'https://chromiumdash.appspot.com/fetch_releases?channel=Stable' | python3 -c "import sys,json; data=json.load(sys.stdin); releases=[r for r in data if r.get('version')]; print('134.0.6998.0') if not releases else print(sorted(releases,key=lambda r:tuple(map(int,r['version'].split('.'))),reverse=True)[0]['version'])")
            echo "chromium_version=$VERSION" >> $GITHUB_OUTPUT
            echo "Resolved version: $VERSION"
          fi

  build-amd64:
    needs: resolve-version
    runs-on: ubuntu-latest
    env:
      CHROMIUM_VERSION: ${{ needs.resolve-version.outputs.chromium_version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push amd64
        uses: docker/build-push-action@v5
        with:
          context: ./chromium-patches
          file: ./chromium-patches/Dockerfile
          target: runtime
          platforms: linux/amd64
          push: true
          build-args: |
            CHROMIUM_VERSION=${{ env.CHROMIUM_VERSION }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.CHROMIUM_VERSION }}-amd64
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-amd64
          # Registry-backed BuildKit cache: no 10 GB GHA limit, so the large
          # Chromium source layer (~8 GB) actually persists between runs.
          # mode=max stores all intermediate stages (source, patched-build, runtime)
          # independently, so patch changes reuse the cached source layer.
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-cache:amd64
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-cache:amd64,mode=max

  # NOTE: arm64 builds are disabled because Chromium's CIPD (depot_tools) does not
  # provide the `gperf` package for linux-arm64, causing `fetch` to fail.
  # Re-enable when Google publishes the missing package or when cross-compilation
  # support is added.
  # build-arm64:
  #   needs: resolve-version
  #   runs-on: ubuntu-24.04-arm
  #   ...

  manifest:
    needs: [resolve-version, build-amd64]
    runs-on: ubuntu-latest
    env:
      CHROMIUM_VERSION: ${{ needs.resolve-version.outputs.chromium_version }}
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag amd64 as latest
        run: |
          # Copy the amd64-specific tag to the versioned and latest tags.
          # Multi-arch support disabled (see build-arm64 note above).

          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.CHROMIUM_VERSION }} \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.CHROMIUM_VERSION }}-amd64

          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-amd64

      - name: Verify manifest
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
