name: Build Custom Chromium

on:
  schedule:
    # Weekly build to pick up new Chromium stable releases
    - cron: '0 6 * * 0'
  workflow_dispatch:
    inputs:
      chromium_version:
        description: 'Chromium version to build (e.g., 134.0.6998.35). Leave empty for latest stable.'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/chromium-stealth

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      chromium_version: ${{ steps.resolve.outputs.chromium_version }}
    steps:
      - name: Resolve Chromium version
        id: resolve
        run: |
          if [ -n "${{ inputs.chromium_version }}" ]; then
            echo "chromium_version=${{ inputs.chromium_version }}" >> $GITHUB_OUTPUT
          else
            echo "Fetching latest stable Chromium version..."
            # Use tuple sort to correctly order patch versions (e.g. .9 < .100)
            VERSION=$(curl -s 'https://chromiumdash.appspot.com/fetch_releases?channel=Stable' | python3 -c "import sys,json; data=json.load(sys.stdin); releases=[r for r in data if r.get('version')]; print('134.0.6998.0') if not releases else print(sorted(releases,key=lambda r:tuple(map(int,r['version'].split('.'))),reverse=True)[0]['version'])")
            echo "chromium_version=$VERSION" >> $GITHUB_OUTPUT
            echo "Resolved version: $VERSION"
          fi

  build-amd64:
    needs: resolve-version
    runs-on: ubuntu-latest
    env:
      CHROMIUM_VERSION: ${{ needs.resolve-version.outputs.chromium_version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push amd64
        uses: docker/build-push-action@v5
        with:
          context: ./chromium-patches
          file: ./chromium-patches/Dockerfile
          target: runtime
          platforms: linux/amd64
          push: true
          build-args: |
            CHROMIUM_VERSION=${{ env.CHROMIUM_VERSION }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.CHROMIUM_VERSION }}-amd64
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-amd64
          # BuildKit GHA cache for Docker layer reuse (covers source-sync and build layers)
          cache-from: type=gha,scope=chromium-amd64
          cache-to: type=gha,mode=max,scope=chromium-amd64

  build-arm64:
    needs: resolve-version
    runs-on: ubuntu-24.04-arm
    env:
      CHROMIUM_VERSION: ${{ needs.resolve-version.outputs.chromium_version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push arm64
        uses: docker/build-push-action@v5
        with:
          context: ./chromium-patches
          file: ./chromium-patches/Dockerfile
          target: runtime
          platforms: linux/arm64
          push: true
          build-args: |
            CHROMIUM_VERSION=${{ env.CHROMIUM_VERSION }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.CHROMIUM_VERSION }}-arm64
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-arm64
          cache-from: type=gha,scope=chromium-arm64
          cache-to: type=gha,mode=max,scope=chromium-arm64

  manifest:
    needs: [resolve-version, build-amd64, build-arm64]
    runs-on: ubuntu-latest
    env:
      CHROMIUM_VERSION: ${{ needs.resolve-version.outputs.chromium_version }}
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          # Combine the per-arch tagged images into a single multi-arch manifest.
          # The per-arch tags (e.g. :134.0.6998.35-amd64) were pushed by the
          # build jobs above (push: true, no push-by-digest) so they exist here.

          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.CHROMIUM_VERSION }} \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.CHROMIUM_VERSION }}-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.CHROMIUM_VERSION }}-arm64

          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-arm64

      - name: Verify manifest
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
