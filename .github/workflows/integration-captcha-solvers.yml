name: Captcha Solver Integration Tests

permissions:
  contents: read

on:
  workflow_dispatch:

jobs:
  captcha-solver-integration:
    name: Captcha Solver Integration (Docker)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Cache uv
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/uv
            ~/.cache/pip
          key: uv-cache-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            uv-cache-

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install test dependencies
        run: |
          uv sync --group dev --extra test

      - name: Build FlareSolverr base image
        run: |
          docker build -t flaresolverr-base:ci .

      - name: Build FlareSolverr image with captcha-challenger libs
        run: |
          cat > Dockerfile.captcha-solvers << 'EOF'
          FROM flaresolverr-base:ci
          RUN pip install --no-cache-dir hcaptcha-challenger recaptcha-challenger || true
          EOF
          docker build -f Dockerfile.captcha-solvers -t flaresolverr-captcha:ci .
          rm -f Dockerfile.captcha-solvers

      - name: Start FlareSolverr with captcha solver libs
        run: |
          docker run -d \
            --name flaresolverr-captcha \
            -p 127.0.0.1:8192:8191 \
            flaresolverr-captcha:ci

      - name: Wait for FlareSolverr to be ready
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8192/ >/dev/null 2>&1; then
              echo "FlareSolverr is ready"
              exit 0
            fi
            sleep 2
          done
          echo "FlareSolverr failed to start"
          docker logs flaresolverr-captcha
          exit 1

      - name: Run captcha solver parameter integration tests
        env:
          FLARESOLVERR_URL: http://127.0.0.1:8192
        run: |
          uv run pytest -m integration tests/integration/test_captcha_solver_param.py -vv

      - name: Dump FlareSolverr logs on failure
        if: failure()
        run: |
          docker logs flaresolverr-captcha

      - name: Tear down services
        if: always()
        run: |
          docker rm -f flaresolverr-captcha || true
          docker rmi flaresolverr-captcha:ci flaresolverr-base:ci || true
